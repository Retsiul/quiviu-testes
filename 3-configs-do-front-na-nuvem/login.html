<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Replay Hub - Acesso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff88;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            background: #252525;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00ff88;
            border: none;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #00cc6e;
        }

        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            cursor: pointer;
        }

        .toggle-link span {
            color: #00ff88;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="form-title">Acessar Sistema</h2>

        <div id="register-fields" style="display: none;">
            <input type="text" id="nome" placeholder="Nome Completo">
        </div>
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="senha" placeholder="Sua Senha">

        <button id="btn-submit" onclick="executarAcao()">Entrar</button>

        <div class="toggle-link" id="toggle-auth" onclick="alternarModo()">
            Não tem conta? <span>Cadastre-se</span>
        </div>
    </div>

    <script>
        let modoLogin = true;
        // URL da API Central na Cloudflare
        const API_BASE_URL = "https://api.quiviu.com.br";

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById("form-title").innerText = modoLogin ? "Acessar Sistema" : "Criar Nova Conta";
            document.getElementById("register-fields").style.display = modoLogin ? "none" : "block";
            document.getElementById("btn-submit").innerText = modoLogin ? "Entrar" : "Cadastrar";
            document.getElementById("toggle-auth").innerHTML = modoLogin ? "Não tem conta? <span>Cadastre-se</span>" : "Já tem conta? <span>Faça Login</span>";
        }

        async function executarAcao() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const nome = document.getElementById("nome").value;

            if (!email || !senha || (!modoLogin && !nome)) {
                alert("Preencha todos os campos.");
                return;
            }

            const rota = modoLogin ? "/api/login" : "/api/registrar";
            const payload = modoLogin ? { email, senha } : { nome, email, senha };

            try {
                // Rota alterada para buscar da URL cheia do subdomínio da API
                const response = await fetch(`${API_BASE_URL}${rota}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const dados = await response.json();

                if (!response.ok) throw new Error(dados.error || "Erro na requisição");

                if (modoLogin) {
                    localStorage.setItem("userToken", dados.token);
                    localStorage.setItem("userName", dados.user.nome);
                    window.location.href = "index.html";
                } else {
                    alert("Cadastro realizado com sucesso! Faça o login.");
                    alternarModo();
                }
            } catch (erro) {
                alert(erro.message);
            }
        }
    </script>
</body>
</html>
