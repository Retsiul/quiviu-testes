<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login.css">
    <title>login</title>

</head>
<body>

    <div class="container">
        <h2 id="form-title">Acessar Sistema</h2>

        <div id="register-fields" style="display: none;">
            <input type="text" id="nome" placeholder="Nome Completo">
        </div>
        <input type="email" id="email" placeholder="Seu E-mail">
        <input type="password" id="senha" placeholder="Sua Senha">

        <button id="btn-submit" onclick="executarAcao()">Entrar</button>

        <div class="toggle-link" id="toggle-auth" onclick="alternarModo()">
            Não tem conta? <span>Cadastre-se</span>
        </div>
    </div>

    <script>
        let modoLogin = true;
        // URL da API Central na Cloudflare
        const API_BASE_URL = "https://api.quiviu.com.br";

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById("form-title").innerText = modoLogin ? "Acessar Sistema" : "Criar Nova Conta";
            document.getElementById("register-fields").style.display = modoLogin ? "none" : "block";
            document.getElementById("btn-submit").innerText = modoLogin ? "Entrar" : "Cadastrar";
            document.getElementById("toggle-auth").innerHTML = modoLogin ? "Não tem conta? <span>Cadastre-se</span>" : "Já tem conta? <span>Faça Login</span>";
        }

        async function executarAcao() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const nome = document.getElementById("nome").value;

            if (!email || !senha || (!modoLogin && !nome)) {
                alert("Preencha todos os campos.");
                return;
            }

            const rota = modoLogin ? "/api/login" : "/api/registrar";
            const payload = modoLogin ? { email, senha } : { nome, email, senha };

            try {
                // Rota alterada para buscar da URL cheia do subdomínio da API
                const response = await fetch(`${API_BASE_URL}${rota}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const dados = await response.json();

                if (!response.ok) throw new Error(dados.error || "Erro na requisição");

                if (modoLogin) {
                    localStorage.setItem("userToken", dados.token);
                    localStorage.setItem("userName", dados.user.nome);
                    window.location.href = "index.html";
                } else {
                    alert("Cadastro realizado com sucesso! Faça o login.");
                    alternarModo();
                }
            } catch (erro) {
                alert(erro.message);
            }
        }
    </script>
</body>
</html>
